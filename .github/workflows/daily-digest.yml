name: Veille quotidienne

on:
  schedule:
    - cron: '0 6 * * *'   # 6h UTC = 7h Paris (hiver) / 8h Paris (été)
  workflow_dispatch:       # Déclenchement manuel pour tests

permissions:
  contents: write          # Nécessaire pour commit auto de seen.db

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DATABASE_PATH: data/seen.db
          LOG_LEVEL: INFO
        run: python -m src.main

      - name: Persist seen.db
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update seen.db [skip ci]"
          file_pattern: 'data/seen.db'
          commit_user_name: 'veille-bot'
          commit_user_email: 'bot@users.noreply.github.com'
