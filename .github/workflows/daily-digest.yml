name: Veille quotidienne

on:
  schedule:
    - cron: '0 3 * * *'   # 3h UTC = 7h La Réunion (UTC+4, pas de DST)
  workflow_dispatch:       # Déclenchement manuel pour tests

permissions:
  contents: write          # Nécessaire pour commit auto de seen.db

env:
  # Force Node.js 24 pour les actions JS encore packagées sur Node 20
  # (actions/checkout@v4, actions/setup-python@v5, git-auto-commit-action@v5).
  # Node 20 sera retiré des runners GitHub le 16/09/2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DATABASE_PATH: data/seen.db
          LOG_LEVEL: INFO
        run: python -m src.main

      - name: Persist seen.db
        # Commit + push manuel avec retry/rebase pour resister a une race
        # avec un push utilisateur survenant pendant le run.
        if: success()
        run: |
          set -e
          git config user.name "veille-bot"
          git config user.email "bot@users.noreply.github.com"

          git add data/seen.db
          if git diff --staged --quiet; then
            echo "Aucune modification de seen.db a commit."
            exit 0
          fi

          git commit -m "chore: update seen.db [skip ci]"

          for tentative in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push reussi a la tentative $tentative."
              exit 0
            fi
            echo "::warning::Push rejete (tentative $tentative), rebase puis retry."
            git pull --rebase origin main
          done

          echo "::error::Echec du push apres 3 tentatives."
          exit 1
